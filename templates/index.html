<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHD MusiQ - Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); }
        .mini-player { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; }
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="bg-black text-gray-200 font-sans">

    <div class="max-w-3xl mx-auto p-4 pb-40">
        <header class="py-8 text-center">
            <h1 class="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-purple-500">
                GHD MusiQ
            </h1>
            <p class="text-xs text-gray-500 mt-1 uppercase tracking-widest">Premium Audio Experience</p>
        </header>

        <div class="sticky top-4 z-20 mb-8">
            <div class="flex gap-2 p-2 bg-gray-900/80 border border-gray-800 rounded-2xl shadow-2xl backdrop-blur-md">
                <input type="text" id="query" class="flex-1 bg-transparent px-4 outline-none text-white" placeholder="Search song, artist, album...">
                <button onclick="newSearch()" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-xl font-bold transition">Search</button>
            </div>
        </div>

        <div id="results" class="flex flex-col gap-3">
            </div>

        <div id="loader" class="hidden text-center py-10 flex flex-col items-center">
            <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-blue-500 mb-2"></div>
            <p class="text-sm text-gray-400">Loading more tracks...</p>
        </div>
    </div>

    <div id="playerUI" class="mini-player glass border-t border-gray-800 p-4 hidden">
        <div class="max-w-3xl mx-auto flex items-center gap-4">
            <img id="pImg" src="" class="w-16 h-16 rounded-md shadow-2xl object-cover border border-gray-700">
            <div class="flex-1 min-w-0">
                <h3 id="pTitle" class="font-bold text-white truncate text-lg"></h3>
                <div class="flex flex-wrap gap-x-3 text-xs text-gray-400">
                    <span id="pArtist" class="truncate font-medium text-blue-400"></span>
                    <span id="pAlbum" class="truncate"></span>
                    <span id="pYear" class="text-gray-500"></span>
                </div>
                <div class="text-[10px] font-bold text-purple-500 mt-1 uppercase tracking-tighter">GHD MusiQ</div>
            </div>
            <audio id="mainAudio" controls class="h-10 w-32 sm:w-48"></audio>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let isFetching = false;
        let currentQuery = "";

        // Reset and start new search
        function newSearch() {
            const query = document.getElementById('query').value;
            if(!query) return;
            
            currentQuery = query;
            currentPage = 1;
            document.getElementById('results').innerHTML = "";
            search();
        }

        async function search() {
            if (isFetching || !currentQuery) return;
            isFetching = true;
            document.getElementById('loader').classList.remove('hidden');

            try {
                // Pinne page parameter api support cheyyunundenkil mathrame work aavu
                const res = await fetch(`/search?query=${currentQuery}&page=${currentPage}`);
                const songs = await res.json();
                
                if (songs && songs.length > 0) {
                    renderSongs(songs);
                    currentPage++;
                }
            } catch (err) {
                console.error("Fetch error:", err);
            } finally {
                isFetching = false;
                document.getElementById('loader').classList.add('hidden');
            }
        }

        function renderSongs(songs) {
            const container = document.getElementById('results');

            songs.forEach(s => {
                const div = document.createElement('div');
                // List Layout Design
                div.className = "group flex items-center gap-4 bg-gray-900/40 p-3 rounded-2xl hover:bg-gray-800/60 transition border border-gray-900 hover:border-gray-700 cursor-pointer";
                div.onclick = () => play(s);
                
                div.innerHTML = `
                    <div class="relative flex-shrink-0">
                        <img src="${s.image}" class="w-16 h-16 rounded-xl object-cover shadow-lg group-hover:scale-105 transition duration-300">
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-white truncate text-base mb-0.5">${s.song}</h4>
                        <p class="text-sm text-gray-400 truncate font-medium">${s.singers}</p>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="text-[10px] bg-gray-800 px-2 py-0.5 rounded text-gray-400 uppercase">${s.album || 'Single'}</span>
                            <span class="text-[10px] text-gray-500">${s.year || ''}</span>
                            <span class="text-[10px] font-bold text-blue-500/80">GHD MusiQ</span>
                        </div>
                    </div>
                    <div class="pr-2">
                        <div class="w-8 h-8 rounded-full bg-blue-600/20 flex items-center justify-center group-hover:bg-blue-600 transition">
                            <svg class="w-4 h-4 text-blue-500 group-hover:text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function play(s) {
            if(!s.media_url) { alert("URL missing!"); return; }
            
            const playerUI = document.getElementById('playerUI');
            playerUI.classList.remove('hidden');
            
            document.getElementById('pTitle').innerText = s.song;
            document.getElementById('pArtist').innerText = s.singers;
            document.getElementById('pAlbum').innerText = s.album ? ` • ${s.album}` : "";
            document.getElementById('pYear').innerText = s.year ? ` • ${s.year}` : "";
            document.getElementById('pImg').src = s.image;
            
            const audio = document.getElementById('mainAudio');
            audio.src = s.media_url;
            audio.play();
        }

        // Automatic scroll detection (Infinite Scroll)
        window.onscroll = function() {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                search();
            }
        };

        // Enter key search support
        document.getElementById('query').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') newSearch();
        });
    </script>
</body>
</html>
