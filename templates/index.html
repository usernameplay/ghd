<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Music Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .mini-player { position: fixed; bottom: 0; left: 0; right: 0; background: #111; color: white; padding: 10px; display: none; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans">

    <div class="container mx-auto p-5 pb-24">
        <h1 class="text-3xl font-bold mb-5 text-center">JioSaavn Player</h1>
        
        <div class="flex gap-2 mb-8">
            <input type="text" id="searchQuery" class="w-full p-3 rounded bg-gray-800 border border-gray-700" placeholder="Search for songs...">
            <button onclick="searchSongs()" class="bg-blue-600 px-6 py-2 rounded">Search</button>
        </div>

        <div id="results" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            </div>
    </div>

    <div id="miniPlayer" class="mini-player border-t border-gray-700">
        <div class="container mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img id="playerImg" src="" class="w-12 h-12 rounded shadow-lg">
                <div>
                    <p id="playerTitle" class="text-sm font-bold truncate w-32 md:w-64"></p>
                    <p id="playerArtist" class="text-xs text-gray-400 truncate w-32"></p>
                </div>
            </div>
            <audio id="audioElement" controls class="h-10"></audio>
        </div>
    </div>

    <script>
        async function searchSongs() {
            const query = document.getElementById('searchQuery').value;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = "Searching...";

            const response = await fetch(`/search?query=${query}`);
            const songs = await response.json();
            
            resultsDiv.innerHTML = "";
            songs.forEach(song => {
                const card = document.createElement('div');
                card.className = "bg-gray-800 p-3 rounded cursor-pointer hover:bg-gray-700 transition";
                card.onclick = () => playSong(song.song, song.singers, song.image, song.media_url);
                
                card.innerHTML = `
                    <img src="${song.image}" class="w-full aspect-square object-cover rounded mb-2">
                    <p class="font-semibold truncate">${song.song}</p>
                    <p class="text-xs text-gray-400 truncate">${song.singers}</p>
                `;
                resultsDiv.appendChild(card);
            });
        }

        function playSong(title, artist, img, url) {
            document.getElementById('miniPlayer').style.display = 'block';
            document.getElementById('playerTitle').innerText = title;
            document.getElementById('playerArtist').innerText = artist;
            document.getElementById('playerImg').src = img;
            
            const audio = document.getElementById('audioElement');
            audio.src = url;
            audio.play();
        }
    </script>
</body>
</html>
